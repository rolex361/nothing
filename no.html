<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi Rama! ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 1. STRICTLY USING THE LAXMAN FILE BACKGROUND COLOR */
            --bg-color: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            
            /* 2. SOLID COLOR ONLY - NO GRADIENTS */
            background-color: var(--bg-color);
            
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3.5rem;
            border-radius: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 80px rgba(0,0,0,0.7);
            transform-style: preserve-3d;
            transform: perspective(1500px);
            transition: transform 0.1s ease;
            max-width: 90%;
            width: 420px;
        }

        /* Glowing Border */
        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 42px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            z-index: -1;
            filter: blur(15px);
            opacity: 0.8;
            animation: moveBorder 20s linear infinite;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 3.8rem;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, #ffeaa7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.4);
            animation: float 4s ease-in-out infinite;
        }

        p {
            font-size: 1.2rem;
            margin-top: 15px;
            opacity: 0.95;
            line-height: 1.8;
            font-weight: 300;
        }

        .highlight {
            color: #fffb00;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255,251,0,0.5);
        }

        footer {
            margin-top: 35px;
            font-size: 0.95rem;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .signer {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes moveBorder {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            .card { padding: 2.5rem; width: 85%; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="card" id="tiltCard">
        <h1>Happy Holi <br> Rama! ✨</h1>
        <p>
            Wishing you a festival filled with <br>
            vibrant colors, joyful laughter, <br>
            and sweet moments. <br>
            <span class="highlight">Keep shining bright! 💻🎨</span>
        </p>
        
        <footer>
            Best wishes,<br>
            <span class="signer">Mahi</span>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let fireworks = [];
        // I REMOVED THE BACKGROUND CLOUDS ARRAY HERE

        // Colors Palette
        const colors = [
            { r: 255, g: 20, b: 147 }, // DeepPink
            { r: 0, g: 191, b: 255 },  // DeepSkyBlue
            { r: 173, g: 255, b: 47 }, // GreenYellow
            { r: 255, g: 215, b: 0 },  // Gold
            { r: 255, g: 69, b: 0 },   // OrangeRed
            { r: 148, g: 0, b: 211 },  // DarkViolet
            { r: 0, g: 255, b: 127 }   // SpringGreen
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            // REMOVED CLOUD CREATION
        }
        window.addEventListener('resize', resize);
        resize();

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // --- I REMOVED THE "BgCloud" CLASS COMPLETELY TO KEEP BACKGROUND CLEAN ---

        // --- 1. FIREWORKS ---
        class FireworkRocket {
            constructor() {
                this.x = Math.random() * width;
                this.y = height;
                this.targetY = Math.random() * (height * 0.5); 
                this.color = getRandomColor();
                this.speed = Math.random() * 3 + 7; 
                this.dead = false;
            }

            update() {
                this.y -= this.speed;
                this.speed *= 0.99;
                if (this.y <= this.targetY || this.speed <= 0.5) {
                    this.explode();
                    this.dead = true;
                }
            }

            draw() {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                const {r,g,b} = this.color;
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.8)`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgb(${r}, ${g}, ${b})`;
                ctx.fill();
                ctx.restore();
            }

            explode() {
                const count = Math.random() * 30 + 50;
                for (let i = 0; i < count; i++) {
                    particles.push(new GlitterParticle(this.x, this.y, this.color));
                }
            }
        }

        class GlitterParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 2;
                this.dx = Math.cos(angle) * speed;
                this.dy = Math.sin(angle) * speed;
                this.radius = Math.random() * 2 + 1;
                this.gravity = 0.1;
                this.friction = 0.95; 
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.dy += this.gravity;
                this.dx *= this.friction;
                this.dy *= this.friction;
                this.x += this.dx;
                this.y += this.dy;
                this.alpha -= this.decay;
            }

            draw() {
                if(this.alpha <= 0) return;
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                const {r,g,b} = this.color;
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = `rgb(${r}, ${g}, ${b})`;
                ctx.fill();
                ctx.restore();
            }
        }

        // --- 2. INTERACTIVE GULAL ---
        class GulalParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 1; 
                this.dx = Math.cos(angle) * speed;
                this.dy = Math.sin(angle) * speed;
                this.radius = Math.random() * 6 + 3;
                this.gravity = 0.05; 
                this.friction = 0.97;
                this.alpha = 1;
                this.decay = Math.random() * 0.01 + 0.005; 
            }

            update() {
                this.dy += this.gravity;
                this.dx *= this.friction;
                this.dy *= this.friction;
                this.x += this.dx;
                this.y += this.dy;
                this.alpha -= this.decay;
            }

            draw() {
                if(this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                const {r,g,b} = this.color;
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.fill();
                ctx.restore();
            }
        }

        function createGulalBurst(x, y) {
            const count = 40;
            const color = getRandomColor();
            for(let i=0; i<count; i++) particles.push(new GulalParticle(x, y, color));
        }

        // --- 3. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            // --- STRICT BACKGROUND CLEARING (From Laxman File) ---
            // This 'rgba(26, 26, 26, 0.1)' matches the background color #1a1a1a
            // The 0.1 opacity creates the trails.
            ctx.fillStyle = 'rgba(26, 26, 26, 0.1)'; 
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillRect(0, 0, width, height);

            // REMOVED THE CLOUD LOOP HERE

            if (Math.random() < 0.015) fireworks.push(new FireworkRocket());
            fireworks.forEach((fw, index) => {
                fw.update();
                fw.draw();
                if(fw.dead) fireworks.splice(index, 1);
            });

            particles.forEach((particle, index) => {
                particle.update();
                particle.draw();
                if (particle.alpha <= 0) particles.splice(index, 1);
            });

            if(particles.length > 500) particles.shift();
        }
        animate();

        // --- 4. INTERACTION ---
        document.addEventListener('click', (e) => createGulalBurst(e.clientX, e.clientY));
        document.addEventListener('touchstart', (e) => {
             for (let i = 0; i < e.touches.length; i++) {
                createGulalBurst(e.touches[i].clientX, e.touches[i].clientY);
            }
        });

        const card = document.getElementById('tiltCard');
        document.addEventListener('mousemove', (e) => {
            if(!window.matchMedia("(min-width: 1024px)").matches) return;
            const xAxis = (width / 2 - e.pageX) / 40; 
            const yAxis = (height / 2 - e.pageY) / 40;
            card.style.transform = `perspective(1500px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        document.addEventListener('mouseleave', () => {
             card.style.transform = `perspective(1500px) rotateY(0deg) rotateX(0deg)`;
        });

    </script>
</body>
</html>
